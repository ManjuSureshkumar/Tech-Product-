<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buy Now</title>

<link href="https://fonts.googleapis.com/css2?family=Inika:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>
<body>

<div class="wrapper">

  <div class="container">

    <div class="header">

      <!-- TOP ROW -->
      <div class="header-top">
        <div class="logo">
          <img src="Images/Logo.png">
        </div>

        <div class="search-box">
          <input type="text" placeholder="Search For">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
        </div>

        <div class="header-right">
          <i class="fa-solid fa-cart-shopping icon"></i>
          <i class="fa-solid fa-bell icon"></i>
          <a href="login.html" class="register-btn">Register</a>
        </div>
      </div>

      <!-- SECOND ROW -->
      <div class="bottom-row">
        <div class="company-name">Tech Company</div>

        <div class="navbar">
          <a href="index.html">Home</a>
          <a href="whychooseus.html">About Us</a>
          <a href="products.html">Product</a>
          <a href="services.html">Service</a>
          <a href="contactus.html">Contact</a>
          <a href="blogs.html">Blogs</a>
        </div>
      </div>

    </div>

  </div>
<section class="buy-section">

  <h1 class="buy-title">Buy Now</h1>

  <!-- FORM -->
  <div class="buy-form">

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" placeholder="Enter your name">
    </div>

    <div class="form-group">
      <label>Contact No</label>
      <input type="text" placeholder="Enter your number">
    </div>

    <div class="form-group">
      <label>Address</label>
      <textarea placeholder="Enter your address"></textarea>
    </div>

  </div>

  <!-- PAYMENT -->
  <h2 class="payment-title">Payment Method</h2>

  <div class="payment-methods">

    <div class="pay-card">
      <img src="Images/gpay.png" alt="UPI">
    </div>

    <div class="pay-card">
      <img src="Images/ppay.png" alt="Wallet">
    </div>

    <div class="pay-card"><a href="cardpayment.html"class="pay-card">
      <img src="Images/card.png" alt="Card"></a>
    </div>

  </div>

  <!-- BUTTON -->
  <button class="buy-btn">Confirm Purchase</button>

</section>
</div>

</body>
</html>
