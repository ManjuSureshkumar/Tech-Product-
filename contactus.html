<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Inika:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

  <!-- HEADER -->
  <div class="container">
    <div class="header">

      <div class="header-top">
        <div class="logo">
          <img src="Images/Logo.png">
        </div>

        <div class="search-box">
          <input type="text" placeholder="Search For">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
        </div>

        <div class="header-right">
          <i class="fa-solid fa-cart-shopping icon"></i>
          <i class="fa-solid fa-bell icon"></i>
          <a href="login.html" class="register-btn">Register</a>
        </div>
      </div>

      <div class="bottom-row">
        <div class="company-name">Tech Company</div>
        <div class="navbar">
          <a href="index.html">Home</a>
          <a href="whychooseus.html">About Us</a>
          <a href="products.html">Product</a>
          <a href="services.html">Service</a>
          <a href="contactus.html">Contact</a>
          <a href="blogs.html">Blogs</a>
        </div>
      </div>

    </div>
  </div>

  <section class="contact-section">

  <h2 class="contact-title">Contact Us</h2>

  <div class="contact-container">

    <!-- LEFT SIDE -->
    <div class="contact-left">

      <div class="input-box">
        <label>Office No</label>
        <input type="text">
      </div>

      <div class="input-box">
        <label>Customer Care No</label>
        <input type="text">
      </div>

      <div class="input-box">
        <label>Office Address</label>
        <textarea></textarea>
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="contact-right">

      <div class="input-box">
        <label>Feedback</label>
        <textarea></textarea>
      </div>

      <div class="input-box">
        <label>E-mail</label>
        <input type="email">
      </div>

      <div class="media-support">
  <h2>Media Support</h2>
  <div class="media-line"></div>

  <!-- SOCIAL -->
  <div class="contact-social">
    <img src="images/con-1.png" alt="">
    <img src="images/con-2.png" alt="">
    <img src="images/con-3.png" alt="">
  </div>

  </div>
    </div>

  </div>
  
</section>
</div>
