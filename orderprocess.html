<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Process</title>

<link href="https://fonts.googleapis.com/css2?family=Inika:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>
<body>

<div class="wrapper">

  <div class="container">

    <div class="header">

      <!-- TOP ROW -->
      <div class="header-top">
        <div class="logo">
          <img src="Images/Logo.png">
        </div>

        <div class="search-box">
          <input type="text" placeholder="Search For">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
        </div>

        <div class="header-right">
          <i class="fa-solid fa-cart-shopping icon"></i>
          <i class="fa-solid fa-bell icon"></i>
          <a href="login.html" class="register-btn">Register</a>
        </div>
      </div>

      <!-- SECOND ROW -->
      <div class="bottom-row">
        <div class="company-name">Tech Company</div>

        <div class="navbar">
          <a href="index.html">Home</a>
          <a href="whychooseus.html">About Us</a>
          <a href="products.html">Product</a>
          <a href="services.html">Service</a>
          <a href="contactus.html">Contact</a>
          <a href="blogs.html">Blogs</a>
        </div>
      </div>

    </div>

  </div>

<section class="order-section">

  <!-- TOP TEXT + IMAGE -->
  <div class="order-top">

    <div class="order-text">
      <h1>Very Fastest Delivery Platform</h1>
    </div>

    <div class="order-img">
      <img src="images/delivery.png" alt="delivery">
    </div>

  </div>

  <!-- PROCESS TITLE -->
  <h2 class="process-title">Order Process</h2>

  <!-- PROCESS STEPS -->
  <div class="process-steps">

    <div class="step">
      <img src="images/confirm.png" alt="">
      <p>Order Confirm</p>
    </div>

    <div class="arrow-line"></div>

    <div class="step">
      <img src="images/deli.png" alt="">
      <p>On Going Order</p>
    </div>

    <div class="arrow-line"></div>

    <div class="step">
      <img src="images/pin.png" alt="">
      <p>Order Delivered</p>
    </div>

  </div>

  <!-- DELIVERY PERSON -->
  <div class="delivery-box">

    <div class="delivery-left">
      <img src="images/delman.jpg" alt="">
    </div>

    <div class="delivery-info">
      <h3>Delivery Man</h3>
      <p>Abdhul Rakuman</p>
      <p>Tech Company</p>
      <p>📍 2/38 Main Road, Alangulam, Tenkasi</p>
      <p>📞 8976589043</p>
    </div>

    <div class="delivery-logo">
      <img src="images/logo.png" alt="">
      <h3>Tech Company</h3>
    </div>

  </div>

</section>

</div>

</body>
</html>
