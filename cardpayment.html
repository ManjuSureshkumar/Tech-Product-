<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Inika:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>
<body>

<div class="wrapper">

  <div class="container">

    <div class="header">

      <!-- TOP ROW -->
      <div class="header-top">
        <div class="logo">
          <img src="Images/Logo.png">
        </div>

        <div class="search-box">
          <input type="text" placeholder="Search For">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
        </div>

        <div class="header-right">
          <i class="fa-solid fa-cart-shopping icon"></i>
          <i class="fa-solid fa-bell icon"></i>
          <a href="login.html" class="register-btn">Register</a>
        </div>
      </div>

      <!-- SECOND ROW -->
      <div class="bottom-row">
        <div class="company-name">Tech Company</div>

        <div class="navbar">
          <a href="index.html">Home</a>
          <a href="whychooseus.html">About Us</a>
          <a href="products.html">Product</a>
          <a href="services.html">Service</a>
          <a href="contactus.html">Contact</a>
          <a href="blogs.html">Blogs</a>
        </div>
      </div>

    </div>

  </div>

  <section class="card-section">

  <!-- CARD PREVIEW -->
  <div class="card-preview">
    <img src="Images/card.png" alt="Card Design">
  </div>

  <!-- FORM -->
  <div class="card-form">

    <div class="form-group">
      <label>Card Holder Name</label>
      <input type="text" placeholder="Enter name">
    </div>

    <div class="form-group">
      <label>Card Number</label>
      <input type="text" placeholder="XXXX XXXX XXXX XXXX">
    </div>

    <div class="row">
      <div class="form-group">
        <label>Card Exp</label>
        <input type="text" placeholder="MM/YY">
      </div>

      <div class="form-group">
        <label>CVV</label>
        <input type="password" placeholder="***">
      </div>
    </div>

  </div>

  <!-- BUTTON -->
  <button class="continue-btn">Continue</button>

</section>

</div>

</body>
</html>
